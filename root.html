<!doctype html>
<!-- ============================================================
     root.html — 어원 한 개 상세 페이지
     ------------------------------------------------------------
     URL 예시 — root.html?id=spec
     실제 동작은 js/root-page.js 가 담당.
     ============================================================ -->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3a9876" />
  <title>어원 학습</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <button class="back-btn" type="button" onclick="if(document.referrer&&new URL(document.referrer).origin===location.origin&&history.length>1)history.back();else location.href=&apos;index.html&apos;;" aria-label="뒤로">←</button>
    <h1 id="pageTitle">어원 학습</h1>
  </header>

  <main class="container">
    <div id="loading" class="loading">불러오는 중…</div>

    <!-- 어원 설명 패널 (스토리, 의미, 원어) -->
    <section id="rootPanel" class="root-panel" hidden-empty></section>

    <!-- 접두어별 단어 트리 -->
    <div id="treeArea"></div>

    <!-- 진도 토글 / 이전·다음 어원 -->
    <div id="rootFooter" class="root-footer"></div>
  </main>

  <script type="module" src="js/root-page.js"></script>
</body>
</html>
