<!doctype html>
<!-- ============================================================
     prefix.html — 접두어 한 개 상세 페이지
     ------------------------------------------------------------
     URL 예시 — prefix.html?id=in
     그 접두어가 등장하는 모든 어원과 단어를 한 화면에 모은다.
     실제 동작은 js/prefix-page.js 가 담당.
     ============================================================ -->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3a9876" />
  <title>접두어 학습</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <button class="back-btn" type="button" aria-label="뒤로">←</button>
    <h1 id="pageTitle">접두어 학습</h1>
  </header>

  <main class="container">
    <div id="loading" class="loading">불러오는 중…</div>

    <!-- 접두어 개요 패널 -->
    <section id="prefixPanel" class="root-panel"></section>

    <!-- 어원별 단어 묶음 -->
    <div id="occurrenceArea"></div>
  </main>

  <script type="module" src="js/prefix-page.js"></script>
</body>
</html>
