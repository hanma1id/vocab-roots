<!doctype html>
<!-- ============================================================
     quiz.html — 어원 단위 묶음 퀴즈
     ------------------------------------------------------------
     URL — quiz.html?root=spec
     해당 어원의 모든 단어를 4지선다 영→한으로 출제.
     결과는 단어별 ✓/✗로 localStorage에 저장.
     ============================================================ -->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3a9876" />
  <title>퀴즈 — 어원 학습</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header app-header-sub">
    <div class="header-row">
      <button class="back-btn" type="button" aria-label="뒤로">←</button>
      <h1 id="pageTitle">퀴즈</h1>
      <a class="map-link home-link" href="index.html" title="홈으로">🏠</a>
    </div>
    <nav class="filter-chips header-nav">
      <a class="chip" href="index.html?filter=step1">
        <span class="chip-step">Step 1</span><span class="chip-sub">기초</span>
      </a>
      <a class="chip" href="index.html?filter=step2">
        <span class="chip-step">Step 2</span><span class="chip-sub">중급</span>
      </a>
      <a class="chip" href="index.html?filter=step3">
        <span class="chip-step">Step 3</span><span class="chip-sub">고급</span>
      </a>
      <a class="chip" href="index.html?filter=prefix">
        <span class="chip-step">접두어</span>
      </a>
      <a class="chip" href="index.html?filter=all">
        <span class="chip-step">전체</span>
      </a>
    </nav>
  </header>

  <main class="container quiz-container">
    <div id="loading" class="loading">불러오는 중…</div>

    <!-- 진행 표시 — 1/12 같은 텍스트 + 가로 막대 -->
    <div id="quizProgressBar" class="quiz-progress-bar" hidden>
      <div id="quizProgressFill" class="quiz-progress-fill"></div>
      <div id="quizProgressText" class="quiz-progress-text"></div>
    </div>

    <!-- 문제 영역 -->
    <div id="quizQuestion" class="quiz-question" hidden></div>
    <div id="quizChoices" class="quiz-choices" hidden></div>

    <!-- 정답 후 피드백 -->
    <div id="quizFeedback" class="quiz-feedback" hidden></div>
    <button id="quizNextBtn" class="quiz-next-btn" hidden>다음 →</button>

    <!-- 결과 화면 -->
    <div id="quizResult" class="quiz-result" hidden></div>
  </main>

  <script type="module" src="js/quiz-page.js"></script>
</body>
</html>
