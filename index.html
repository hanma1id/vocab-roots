<!doctype html>
<!-- ============================================================
     index.html — 어원 학습 PWA 홈
     ------------------------------------------------------------
     상단 검색창 → 단어/어원/접두어 한 번에 검색
     그 아래 필터 칩 → 전체 / 라틴어 / 그리스어 / 접두어
     그리드는 한 화면에 어원 카드와 접두어 카드를 같이 노출
     ============================================================ -->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3a9876" />
  <title>어원으로 배우는 영어단어</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 상단 sticky 헤더 — 제목 + 항상 보이는 칩 네비 -->
  <header class="app-header app-header-home">
    <div class="header-row">
      <h1>어원으로 배우는 영어단어</h1>
      <a class="map-link" href="map.html" title="의미 지도 보기">🗺</a>
    </div>
    <!-- 칩 바 — 스크롤해도 헤더에 붙어 항상 보임 -->
    <div class="filter-chips" id="filterChips" role="tablist">
      <button class="chip active" data-filter="step1">
        <span class="chip-step">Step 1</span>
        <span class="chip-sub">기초</span>
      </button>
      <button class="chip" data-filter="step2">
        <span class="chip-step">Step 2</span>
        <span class="chip-sub">중급</span>
      </button>
      <button class="chip" data-filter="step3">
        <span class="chip-step">Step 3</span>
        <span class="chip-sub">고급</span>
      </button>
      <button class="chip" data-filter="prefix">
        <span class="chip-step">접두어</span>
      </button>
      <button class="chip" data-filter="all">
        <span class="chip-step">전체</span>
      </button>
    </div>
  </header>

  <main class="container">
    <!-- 검색 — 단어/어원/접두어 어느 것이든 -->
    <div class="search-bar">
      <input id="searchInput" type="search" inputmode="search"
             autocomplete="off" autocapitalize="off" spellcheck="false"
             placeholder="단어, 어원, 접두어로 검색 (예 inspect, port, in-)" />
      <button id="searchClear" type="button" hidden aria-label="지우기">✕</button>
    </div>
    <div id="searchResults" class="search-results" hidden></div>

    <div id="loading" class="loading">불러오는 중…</div>

    <!-- 결과 영역 — 스텝별 섹션 또는 한 그리드 -->
    <div id="cardArea"></div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
